<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login_reg.css">
    <title>Вход</title>

</head>

<body>

    <div class="auth-container">

        <div class="branding">

            <img src="../images/logo.png" class="logo" alt="InviteMEme Logo">

            <h1>InviteMEme</h1>

            <p>
                Създавай и изпращай покани за презентации
                чрез шаблони или забавни мемета.
            </p>

        </div>

        <div class="form-container">
            <h2>Вход</h2>

            <form action="../auth/login.php" method="POST">

                <label for="email">Имейл</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Парола</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Вход</button>

            </form>

            <div class="link">
                <p>Нямате акаунт? <a href="register.html">Регистрация</a></p>
            </div>
        </div>
    </div>

</body>

</html>
