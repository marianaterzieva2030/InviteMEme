# GitLab CI/CD Pipeline for w26-invitememe

image: docker:latest
stages:
  - build
  - deploy
variables:
  DOCKER_DRIVER: overlay2
  CI_CONFIG_HASH: 6bcea47db6c4ded855d5a38868a4bc6c58ced52263cb5e9c754959ab85584a91
.before_script_common:
  variables: {}
  before_script:
    - apk add --no-cache curl bash
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
    - |-
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "Using docker-compose.main.yaml"
        cp -rf .secure_files/docker-compose.main.yaml docker-compose.yml
        ls -la
      elif [ "$CI_COMMIT_BRANCH" = "dev" ]; then
        echo "Using docker-compose.dev.yaml"
        cp -rf .secure_files/docker-compose.dev.yaml docker-compose.yml
      else
        echo "Unsupported branch: $CI_COMMIT_BRANCH"
        exit 1
      fi
build_app:
  extends: .before_script_common
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - when: never
  tags:
    - HSS
  script:
    - docker compose -f docker-compose.yml build app --no-cache
    - docker tag w26-invitememe-5k0ad5-app w26-invitememe-5k0ad5-app:$CI_COMMIT_BRANCH
    - docker save w26-invitememe-5k0ad5-app:$CI_COMMIT_BRANCH -o w26-invitememe-5k0ad5-app.tar
  artifacts:
    paths:
      - w26-invitememe-5k0ad5-app.tar
deploy_app:
  extends: .before_script_common
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - when: never
  tags:
    - HSS
  needs:
    - build_app
  script:
    - docker-compose rm -s -f app || true
    - docker rmi w26-invitememe-5k0ad5-app:$CI_COMMIT_BRANCH || true
    - docker load -i w26-invitememe-5k0ad5-app.tar
    - docker-compose up -d app
